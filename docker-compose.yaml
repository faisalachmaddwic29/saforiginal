version: '3.8'

services:
  saforiginal-fe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saforiginal-fe
    environment:
      - NODE_ENV=production
      - NITRO_HOST=0.0.0.0
      - NITRO_PORT=3001
    expose:
      - "3001"
    networks:
      - saforiginal-net
    restart: unless-stopped
    # Add health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: saforiginal-proxy
    ports:
      - "3001:3001"
    volumes:
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      saforiginal-fe:
        condition: service_healthy
    networks:
      - saforiginal-net
    restart: unless-stopped

networks:
  saforiginal-net:
    driver: bridge